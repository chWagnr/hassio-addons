name: Update add-on changelogs

on:
  push:
    branches:
      - main
    paths:
      - "certflow/config.yaml"
      - "papra/config.yaml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: addon-changelog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create changelog entries
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            changed_files=$'certflow/config.yaml\npapra/config.yaml'
          else
            changed_files="$(git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}")"
          fi

          for addon in certflow papra; do
            config_file="${addon}/config.yaml"
            if ! printf '%s\n' "${changed_files}" | grep -qx "${config_file}"; then
              continue
            fi
            if [ "${EVENT_NAME}" != "workflow_dispatch" ] && ! git diff --unified=0 "${BEFORE_SHA}" "${GITHUB_SHA}" -- "${config_file}" | grep -qE '^\+version: '; then
              echo "${config_file} changed without a version update; skipping."
              continue
            fi

            version="$(sed -n 's/^version: "\(.*\)"$/\1/p' "${config_file}")"
            if [ -z "${version}" ]; then
              echo "Unable to read the version from ${config_file}." >&2
              exit 1
            fi

            case "${addon}" in
              certflow) display_name="CertFlow" ;;
              papra) display_name="Papra" ;;
            esac
            changelog_file="${addon}/CHANGELOG.md"

            # Start after the version currently recorded in this add-on's
            # changelog, so changes are listed exactly once.
            previous_version="$(sed -n '/^## \[Unreleased\]$/d; s/^## \[\([^]]*\)\].*/\1/p' "${changelog_file}" | head -n 1)"
            baseline_commit=""
            if [ -n "${previous_version}" ]; then
              baseline_commit="$(git log -G "version: \"${previous_version}\"" --format=%H -n 1 -- "${config_file}")"
            fi
            if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${version}" = "${previous_version}" ]; then
              echo "${addon} changelog is already current; skipping."
              continue
            fi
            commit_range="${baseline_commit:+${baseline_commit}..}${GITHUB_SHA}"

            notes_file="$(mktemp)"
            {
              echo "## ${display_name} ${version}"
              echo
              echo "### Änderungen"
              git log --no-merges --format='- %s ([%h](https://github.com/${GITHUB_REPOSITORY}/commit/%H))' "${commit_range}" -- "${addon}" renovate.json
            } > "${notes_file}"

            if ! grep -q '^-' "${notes_file}"; then
              echo "- Versionsupdate und Wartung." >> "${notes_file}"
            fi

            changelog_entry="$(mktemp)"
            {
              echo "## [${version}] - $(date -u +%F)"
              echo
              sed '1,2d' "${notes_file}"
              echo
            } > "${changelog_entry}"

            updated_changelog="$(mktemp)"
            awk -v entry="${changelog_entry}" '
              { print }
              /^## \[Unreleased\]$/ {
                print ""
                while ((getline line < entry) > 0) print line
                close(entry)
              }
            ' "${changelog_file}" > "${updated_changelog}"
            mv "${updated_changelog}" "${changelog_file}"

          done

      - name: Create changelog pull request
        id: changelog-pr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/addon-changelog
          delete-branch: true
          sign-commits: true
          commit-message: "docs: update add-on changelogs"
          title: "docs: update add-on changelogs"
          body: "Automatisch aus Änderungen an den Add-on-Versionen generiert."

      - name: Enable squash auto-merge
        if: steps.changelog-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.changelog-pr.outputs.pull-request-number }}" --auto --squash --delete-branch

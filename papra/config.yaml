name: Papra
version: "26.4.0"
slug: papra
description: Minimal document management platform – self-hosted with a clean UI.
url: https://github.com/chWagnr/hassio-addons/tree/main/papra
panel_admin: false
panel_icon: mdi:file-document-outline
panel_title: Papra
arch:
  - amd64
  - aarch64
  - armv7
ports:
  1221/tcp: 1221
ports_description:
  1221/tcp: Papra Web UI
webui: http://[HOST]:[PORT:1221]
watchdog: tcp://[HOST]:[PORT:1221]
map:
  - addon_config:rw
  - share:rw
backup: cold
options:
  app_base_url: "http://homeassistant.local:1221"
  auth_secret: null
  trusted_origins: ""
  extra_env: []
schema:
  app_base_url: str
  auth_secret: password
  trusted_origins: str?
  extra_env:
    - str

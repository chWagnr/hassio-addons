name: Papra
version: "26.0.0"
slug: papra
description: Minimal document management platform – self-hosted with a clean UI.
url: https://github.com/chWagnr/hassio-addons/tree/main/papra
arch:
  - amd64
  - aarch64
  - armv7
ports:
  1221/tcp: 1221
ports_description:
  1221/tcp: Papra Web UI
map:
  - data:rw
backup: cold
options:
  app_base_url: "http://homeassistant.local:1221"
  auth_secret: ""
  trusted_origins: ""
  extra_env: []
schema:
  app_base_url: str
  auth_secret: str
  trusted_origins: str?
  extra_env:
    - str
